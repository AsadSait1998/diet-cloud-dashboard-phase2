name: Deploy dashboard to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-frontend.yml']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure the production API endpoint
        env:
          FUNCTION_API_BASE_URL: ${{ secrets.FUNCTION_API_BASE_URL }}
        shell: bash
        run: |
          if [ -z "$FUNCTION_API_BASE_URL" ]; then
            echo "FUNCTION_API_BASE_URL is required" >&2
            exit 1
          fi
          python - <<'PY'
          import json, os, pathlib
          value = os.environ['FUNCTION_API_BASE_URL'].rstrip('/')
          pathlib.Path('frontend/config.js').write_text(
              'window.DIET_DASHBOARD_CONFIG = { apiBaseUrl: ' + json.dumps(value) + ' };\n',
              encoding='utf-8'
          )
          PY
      - name: Deploy static files
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: ''
          skip_app_build: true
