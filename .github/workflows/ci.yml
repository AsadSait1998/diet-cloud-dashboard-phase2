name: Validate Phase 2 project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile Python source
        run: python -m compileall -q backend scripts
      - name: Run unit tests
        run: python -m unittest discover -s backend/tests -v
      - name: Verify required frontend assets
        shell: bash
        run: |
          test -s frontend/index.html
          test -s frontend/app.js
          test -s frontend/styles.css
          test -s frontend/staticwebapp.config.json

